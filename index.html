<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 60%, #162032 100%);
        }

        .search-input {
            border-radius: 12px 0 0 12px !important;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 18px;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.45); }
        .search-input:focus {
            background: rgba(255,255,255,0.15);
            color: #fff;
            box-shadow: none;
            border-color: transparent;
        }

        .search-btn {
            border-radius: 0 12px 12px 0 !important;
            background: #f5c842;
            border: none;
            color: #0d1b2a;
            font-weight: 600;
            padding: 12px 22px;
            transition: background 0.2s;
        }
        .search-btn:hover { background: #ffe98a; color: #0d1b2a; }

        .weather-card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            color: #e8eaf6;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .temp-display {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
        }

        .stat-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .stat-box .value { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .stat-box .label { font-size: 0.72rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }

        .badge-country {
            background: rgba(245,200,66,0.15);
            border: 1px solid rgba(245,200,66,0.35);
            color: #f5c842;
            font-size: 0.75rem;
            border-radius: 20px;
            padding: 4px 12px;
            font-weight: 500;
        }

        .weather-emoji { font-size: 3.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }

        .error-alert {
            background: rgba(255,80,80,0.12);
            border: 1px solid rgba(255,80,80,0.25);
            color: #ff8a80;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .spinner-border { width: 1.1rem; height: 1.1rem; }

        .divider { border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

    <div class="container" style="max-width: 500px;">

        <!-- Header -->
        <div class="text-center mb-4">
            <h1 class="fw-bold text-white mb-1" style="font-size:2.2rem; letter-spacing:-0.02em;">
                🌤 Weather
            </h1>
            <p class="text-white-50 small text-uppercase letter-spacing mb-0">Real-time forecasts</p>
        </div>

        <!-- Search -->
        <div class="mb-3">
            <form id="form">
                <div class="input-group">
                    <input type="text" id="city" class="form-control search-input"
                        placeholder="Enter city name…" autocomplete="off">
                    <button class="search-btn btn" id="submitBtn" type="submit">
                        <span id="btnText"><i class="bi bi-search me-1"></i> Search</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </div>
            </form>
            <div id="errorMsg" class="alert error-alert mt-2 py-2 px-3 d-none">
                <i class="bi bi-exclamation-circle me-1"></i> City not found. Please try again.
            </div>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="weather-card p-4 d-none">

            <!-- City + Emoji -->
            <div class="d-flex align-items-start justify-content-between mb-3">
                <div>
                    <h2 class="fw-bold text-white mb-1" id="resCity" style="font-size:1.8rem;"></h2>
                    <span class="badge-country" id="resCountry"></span>
                </div>
                <div class="weather-emoji" id="resEmoji"></div>
            </div>

            <hr class="divider my-3">

            <!-- Temp + Description -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <div class="temp-display">
                        <span id="resTemp"></span><span class="fs-3 text-warning">°C</span>
                    </div>
                    <div class="text-white-50 small mt-1">Feels like <span id="resFeels" class="text-white fw-semibold"></span>°C</div>
                </div>
                <div class="text-end">
                    <div class="text-white fw-semibold text-capitalize" id="resDesc" style="font-size:1rem;"></div>
                    <div class="text-white-50 small">Current conditions</div>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="row g-2">
                <div class="col-4">
                    <div class="stat-box">
                        <div class="fs-5">💧</div>
                        <div class="value" id="resHumidity"></div>
                        <div class="label">Humidity</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="stat-box">
                        <div class="fs-5">💨</div>
                        <div class="value" id="resWind"></div>
                        <div class="label">Wind</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="stat-box">
                        <div class="fs-5">🔎</div>
                        <div class="value" id="resVisibility"></div>
                        <div class="label">Visibility</div>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-white-50 mt-3" style="font-size:0.7rem; letter-spacing:0.08em;">
            POWERED BY OPENWEATHERMAP
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        const form       = document.getElementById('form');
        const cityInput  = document.getElementById('city');
        const errorMsg   = document.getElementById('errorMsg');
        const resultCard = document.getElementById('resultCard');
        const btnText    = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const apikey     = "0281ad00155576b52e32ee542aaac930";

        const emojiMap = {
            Thunderstorm:'⛈️', Drizzle:'🌦️', Rain:'🌧️', Snow:'❄️',
            Clear:'☀️', Clouds:'☁️', Mist:'🌫️', Fog:'🌁',
            Haze:'😶‍🌫️', Smoke:'🌫️', Dust:'🌪️', Tornado:'🌪️'
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = cityInput.value.trim();
            if (!q) return;

            // loading state
            btnText.classList.add('d-none');
            btnSpinner.classList.remove('d-none');
            errorMsg.classList.add('d-none');

            try {
                const res  = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(q)}&appid=${apikey}&units=metric`);
                const data = await res.json();

                if (data.cod == 404 || data.cod === '404') throw new Error('not found');

                const { name, sys, main, weather, wind, visibility } = data;

                document.getElementById('resCity').textContent       = name;
                document.getElementById('resCountry').textContent    = `🌍 ${sys.country}`;
                document.getElementById('resTemp').textContent       = Math.round(main.temp);
                document.getElementById('resFeels').textContent      = Math.round(main.feels_like);
                document.getElementById('resDesc').textContent       = weather[0].description;
                document.getElementById('resHumidity').textContent   = `${main.humidity}%`;
                document.getElementById('resWind').textContent       = `${Math.round(wind.speed)} m/s`;
                document.getElementById('resVisibility').textContent = visibility ? `${(visibility/1000).toFixed(1)} km` : '—';
                document.getElementById('resEmoji').textContent      = emojiMap[weather[0].main] || '🌤️';

                // re-trigger animation
                resultCard.classList.add('d-none');
                void resultCard.offsetWidth;
                resultCard.classList.remove('d-none');

                cityInput.value = '';
            } catch {
                errorMsg.classList.remove('d-none');
            } finally {
                btnText.classList.remove('d-none');
                btnSpinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
